body {
  background: #000;
  font-family: 'Courier New', monospace;

<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 720, H = 1280;
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr; canvas.height = H * dpr;
ctx.scale(dpr, dpr);
function fitCanvas(){
  const scale = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width = W*scale + 'px';
  canvas.style.height = H*scale + 'px';
  canvas.style.position = 'fixed';
  canvas.style.left = (window.innerWidth - W*scale)/2 + 'px';
  canvas.style.top = (window.innerHeight - H*scale)/2 + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);
function portrait(){ return true; }
function S(){ return 1; }
function fs(base){ return Math.round(base); }

// ── helpers ──────────────────────────────────────────────────────────
const rand   = (a,b) => Math.random()*(b-a)+a;
const randInt= (a,b) => Math.floor(rand(a,b+1));
const dist   = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const norm   = (dx,dy) => { const l=Math.hypot(dx,dy)||1; return {x:dx/l,y:dy/l}; };
const lerp   = (a,b,t) => a+(b-a)*t;
const clamp  = (v,a,b) => Math.max(a,Math.min(b,v));
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=randInt(0,i);[arr[i],arr[j]]=[arr[j],arr[i]];} return arr;}
// hex to rgba helper
function hexAlpha(hex,a){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── image loading ────────────────────────────────────────────────────
// character PNGs — transparent PNGs, no pixel manipulation needed
const charImages={};
const charImgFiles={
  xiaoxiaoyu:'xiaoxiaoyu.PNG', zhimoushi:'zhimoushi.PNG',
  yixiaoze:'yixiaoze.PNG', guanyiyi:'guanyiyi.PNG', nianrenbao:'nianrenbao.PNG'
};
for(const [k,src] of Object.entries(charImgFiles)){
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=(function(key,im){return ()=>{charImages[key]=im;};})(k,img);
  img.onerror=(function(key,s){return ()=>{
    // retry once without crossOrigin (some mobile browsers block it)
    const retry=new Image();
    retry.onload=()=>{charImages[key]=retry;};
    retry.src=s;
  };})(k,src);
  img.src=src;
}

}
function writeSave(s){ localStorage.setItem('souler_save',JSON.stringify(s)); }

// ── input ────────────────────────────────────────────────────────────
const keys={};
let mouse={x:0,y:0};
// virtual joystick state
let joystick={active:false, sx:0, sy:0, cx:0, cy:0, dx:0, dy:0};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){ if(state==='title') state='charselect'; }
});
document.addEventListener('keyup',e=>keys[e.key]=false);
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)*W/r.width; mouse.y=(e.clientY-r.top)*H/r.height;
});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*W/r.width, my=(e.clientY-r.top)*H/r.height;
  if(state==='title'){state='charselect';return;}
  if(state==='charselect'){handleCharSelectClick(mx,my);return;}
  if(state==='mapselect'){handleMapSelectClick(mx,my);return;}
  if(state==='levelup'){handleLevelUpClick(mx,my);return;}
  if(state==='gameover'||state==='victory'){state='charselect';return;}
});
// touch joystick — follow-finger: appears where you press, disappears on release
const JR=80; // joystick outer radius
const JR_INNER=30; // joystick inner knob radius
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const t=e.touches[0];
  const tx=(t.clientX-r.left)*W/r.width, ty=(t.clientY-r.top)*H/r.height;
  if(state==='title'){state='charselect';return;}
  if(state==='charselect'){handleCharSelectClick(tx,ty);return;}
  if(state==='mapselect'){handleMapSelectClick(tx,ty);return;}
  if(state==='levelup'){handleLevelUpClick(tx,ty);return;}
  if(state==='gameover'||state==='victory'){state='charselect';return;}
  if(state==='playing'){
    joystick.active=true; joystick.sx=tx; joystick.sy=ty; joystick.cx=tx; joystick.cy=ty; joystick.dx=0; joystick.dy=0;
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!joystick.active) return;
  const r=canvas.getBoundingClientRect();
  const t=e.touches[0];
  joystick.cx=(t.clientX-r.left)*W/r.width;
  joystick.cy=(t.clientY-r.top)*H/r.height;
  const ddx=joystick.cx-joystick.sx, ddy=joystick.cy-joystick.sy;
  const dl=Math.hypot(ddx,ddy)||1;
  const cl=Math.min(dl,JR);
  joystick.dx=ddx/dl*cl/JR; joystick.dy=ddy/dl*cl/JR;
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  joystick.active=false; joystick.dx=0; joystick.dy=0;
},{passive:false});
window.addEventListener('orientationchange',()=>setTimeout(fitCanvas,200));

// ── game state ───────────────────────────────────────────────────────
let state='title';
let selectedCharKey=null, selectedMapIdx=0;
let player, camera, enemies, projectiles, gems, particles;
let damageNums, lightningFX;
let gameTime, score, spawnTimer;

let mapHazards={};

let sessionCrystals=0;
let roundBanner=null;

// ── Enemy class ──────────────────────────────────────────────────────
class Enemy {
  constructor(x,y,ti,elapsed){
    const t=ETYPES[ti];
    const mins=elapsed/60;
    const sm=0.6+mins*0.22;
    const rm=0.85+mins*0.04;
    this.ti=ti; this.shape=t.shape; this.x=x; this.y=y;
    this.r=Math.round(t.r*rm);
    this.hp=Math.ceil(t.hp*sm); this.maxHp=this.hp;
    this.spd=t.spd*(0.6+mins*0.08);
    this.dmg=t.dmg*sm;
    this.col=t.col; this.xp=t.xp; this.sc=Math.ceil(t.sc*sm);
    this.name=t.n;
    this.dead=false; this.hitT=0;
    this.wobble=rand(0,Math.PI*2); this.contactCd=0;
    this.poisonT=0; this.slowT=0;
  }
  takeDamage(amt){
    if(this.dead) return;
    amt*=(player?player.dmgMult:1);
    this.hp-=amt; this.hitT=0.12;
    spawnDmgNum(this.x,this.y,Math.floor(amt));
    if(player&&player.poisonDmg>0) this.poisonT=2;
    if(this.hp<=0){this.dead=true;this.die();}
  }
  die(){
    score+=this.sc;
    for(let i=0;i<this.xp;i++) gems.push(new Gem(this.x+rand(-12,12),this.y+rand(-12,12),1));
    spawnParticles(this.x,this.y,this.col,8);
    if(player&&player.healOnKill>0) player.hp=Math.min(player.hp+player.healOnKill,player.maxHp);
  }
  update(dt){
    if(this.slowT>0) this.slowT-=dt;
    const spdMult=this.slowT>0?0.5:1;
    const dx=player.x-this.x,dy=player.y-this.y,d=Math.hypot(dx,dy)||1;
    this.x+=dx/d*this.spd*spdMult*dt;
    this.y+=dy/d*this.spd*spdMult*dt;
    this.wobble+=dt*3.5;
    if(this.hitT>0) this.hitT-=dt;
    if(this.contactCd>0) this.contactCd-=dt;
    if(this.poisonT>0){
      this.poisonT-=dt;
      const pdmg=(player?player.poisonDmg||0:0);
      if(pdmg>0){this.hp-=pdmg*dt;if(this.hp<=0&&!this.dead){this.dead=true;this.die();}}
    }
    if(!this.dead&&dist(this,player)<this.r+player.r&&this.contactCd<=0){
      player.takeDamage(this.dmg*(1-player.defense)); this.contactCd=0.5;
    }
  }
  // FIX #8: distinct monster visuals per shape
  draw(){
    const sx=this.x-camera.x, sy=this.y-camera.y;
    if(sx<-80||sx>W+80||sy<-80||sy>H+80) return;
    const bob=Math.sin(this.wobble)*2;
    const ed=norm(player.x-this.x,player.y-this.y);
    ctx.save();
    if(this.hitT>0) ctx.filter='brightness(3) saturate(0)';
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(sx,sy+this.r-1,this.r*.8,this.r*.3,0,0,Math.PI*2); ctx.fill();
    const r=this.r;
    switch(this.shape){
      case 'slime':
        ctx.fillStyle=this.col;
        ctx.beginPath();
        ctx.ellipse(sx,sy+bob+r*0.15,r,r*0.85,0,0,Math.PI*2); ctx.fill();
        // highlight
        ctx.fillStyle='rgba(255,255,255,0.25)';
        ctx.beginPath(); ctx.ellipse(sx-r*0.2,sy+bob-r*0.15,r*0.3,r*0.25,0,0,Math.PI*2); ctx.fill();
        // eyes
        ctx.fillStyle='#111';
        ctx.beginPath(); ctx.arc(sx-r*0.25,sy+bob,r*0.12,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx+r*0.25,sy+bob,r*0.12,0,Math.PI*2); ctx.fill();

        ctx.quadraticCurveTo(sx-r*1.2,sy+bob+r*0.6,sx,sy+bob+r*0.2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(sx,sy+bob);
        ctx.quadraticCurveTo(sx+r*2,sy+bob-r*1.5+flap*r,sx+r*2.2,sy+bob+r*0.4);
        ctx.quadraticCurveTo(sx+r*1.2,sy+bob+r*0.6,sx,sy+bob+r*0.2); ctx.fill();

        break;

        // crack

        break;
      case 'wolf':

        // body - elongated
        ctx.beginPath(); ctx.ellipse(sx,sy+bob,r*1.1,r*0.8,0,0,Math.PI*2); ctx.fill();

        ctx.beginPath(); ctx.ellipse(sx+r*0.3,sy+bob-r*0.1,r*0.15,r*0.1,0,0,Math.PI*2); ctx.fill();

        ctx.beginPath(); ctx.moveTo(sx,sy+bob+r*0.2); ctx.lineTo(sx+r*0.08,sy+bob+r*0.45); ctx.lineTo(sx+r*0.15,sy+bob+r*0.2); ctx.fill();

        ctx.beginPath(); ctx.moveTo(sx+r*0.4,sy+bob-r*0.75); ctx.lineTo(sx+r*0.55,sy+bob-r*1.3); ctx.lineTo(sx+r*0.2,sy+bob-r*0.8); ctx.fill();

        ctx.fillStyle='#ffcc00'; ctx.shadowBlur=4; ctx.shadowColor='#ffcc00';
        ctx.beginPath(); ctx.arc(sx-r*0.25,sy+bob-r*0.05,r*0.12,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx+r*0.25,sy+bob-r*0.05,r*0.12,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
        break;
      case 'ghost':

        grd.addColorStop(0,'rgba(100,180,255,0.18)'); grd.addColorStop(1,'rgba(100,180,255,0)');
        ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(sx,sy+bob,r*1.6,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=0.75; ctx.fillStyle=this.col;
        ctx.beginPath(); ctx.ellipse(sx,sy+bob,r*0.9,r,0,0,Math.PI*2); ctx.fill();
        // wispy tail
        const awX=-ed.x, awY=-ed.y, tail=Math.sin(this.wobble)*r*0.3;
        ctx.beginPath();
        ctx.moveTo(sx-r*0.5,sy+bob+r*0.7);
        ctx.quadraticCurveTo(sx-r*0.7+awX*r*0.5,sy+bob+r*1.2+awY*r*0.3+tail,sx-r*0.3+awX*r*0.7,sy+bob+r*1.5+awY*r*0.4);
        ctx.moveTo(sx+r*0.5,sy+bob+r*0.7);
        ctx.quadraticCurveTo(sx+r*0.7+awX*r*0.5,sy+bob+r*1.2+awY*r*0.3-tail,sx+r*0.3+awX*r*0.7,sy+bob+r*1.5+awY*r*0.4);
        ctx.fill(); ctx.globalAlpha=1;
        // hollow eyes
        ctx.fillStyle='rgba(0,0,0,0.85)';
        ctx.beginPath(); ctx.ellipse(sx-r*0.3,sy+bob-r*0.15,r*0.18,r*0.25,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(sx+r*0.3,sy+bob-r*0.15,r*0.18,r*0.25,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(130,210,255,0.7)';
        ctx.beginPath(); ctx.ellipse(sx-r*0.3,sy+bob-r*0.15,r*0.08,r*0.12,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(sx+r*0.3,sy+bob-r*0.15,r*0.08,r*0.12,0,0,Math.PI*2); ctx.fill();
        break;
      case 'spider':
        ctx.fillStyle=this.col;
        ctx.beginPath(); ctx.ellipse(sx,sy+bob,r*0.7,r*0.6,0,0,Math.PI*2); ctx.fill();
        // 8 legs
        ctx.strokeStyle=this.col; ctx.lineWidth=1.5;
        for(let i=0;i<4;i++){
          const la=(-0.5+i*0.35)*Math.PI, lf=Math.sin(this.wobble+i)*3;
          ctx.beginPath(); ctx.moveTo(sx+Math.cos(la)*r*0.5,sy+bob+Math.sin(la)*r*0.4);
          ctx.lineTo(sx+Math.cos(la)*r*1.5,sy+bob+Math.sin(la)*r*1.2+lf); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(sx-Math.cos(la)*r*0.5,sy+bob+Math.sin(la)*r*0.4);
          ctx.lineTo(sx-Math.cos(la)*r*1.5,sy+bob+Math.sin(la)*r*1.2+lf); ctx.stroke();
        }
        // multiple red eyes
        ctx.fillStyle='#ff0000';
        for(let i=-1;i<=1;i++){
          ctx.beginPath(); ctx.arc(sx+i*r*0.2,sy+bob-r*0.15,r*0.08,0,Math.PI*2); ctx.fill();
        }
        // fangs
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.moveTo(sx-r*0.15,sy+bob+r*0.2); ctx.lineTo(sx-r*0.1,sy+bob+r*0.45); ctx.lineTo(sx-r*0.05,sy+bob+r*0.2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(sx+r*0.05,sy+bob+r*0.2); ctx.lineTo(sx+r*0.1,sy+bob+r*0.45); ctx.lineTo(sx+r*0.15,sy+bob+r*0.2); ctx.fill();
        break;
      case 'flame':
        const fg=ctx.createRadialGradient(sx,sy+bob,0,sx,sy+bob,r*1.3);
        fg.addColorStop(0,'#ffee44'); fg.addColorStop(0.5,this.col); fg.addColorStop(1,'rgba(255,50,0,0)');
        ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(sx,sy+bob,r*1.3,0,Math.PI*2); ctx.fill();
        // flickering core
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(sx,sy+bob,r*0.35,0,Math.PI*2); ctx.fill();
        // flame wisps
        ctx.fillStyle='#ff4400';
        for(let i=0;i<3;i++){
          const fa=this.wobble+i*2.1, fx=Math.cos(fa)*r*0.4, fy=-r*0.6-Math.sin(fa*1.5)*r*0.4;
          ctx.beginPath(); ctx.arc(sx+fx,sy+bob+fy,r*0.25,0,Math.PI*2); ctx.fill();
        }
        // eyes
        ctx.fillStyle='#111';
        ctx.beginPath(); ctx.arc(sx-r*0.2,sy+bob-r*0.05,r*0.1,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx+r*0.2,sy+bob-r*0.05,r*0.1,0,Math.PI*2); ctx.fill();
        break;
      default:
        ctx.fillStyle=this.col;
        ctx.beginPath(); ctx.arc(sx,sy+bob,r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#ff2200'; const er=r*0.45,eyeR=2;
        ctx.beginPath();
        ctx.arc(sx+ed.x*er-ed.y*3,sy+bob+ed.y*er+ed.x*3,eyeR,0,Math.PI*2);
        ctx.arc(sx+ed.x*er+ed.y*3,sy+bob+ed.y*er-ed.x*3,eyeR,0,Math.PI*2);
        ctx.fill();
    }
    ctx.restore();
    if(this.hp<this.maxHp){
      const bw=r*2.5,bh=4,bx=sx-bw/2,by=sy-r-12;
      ctx.fillStyle='#333'; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle='#ff3344'; ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
    }
  }
}

// ── Boss class ───────────────────────────────────────────────────────
class Boss {
  constructor(x,y,mapIdx,isSecond){
    this.x=x;this.y=y;this.r=44;this.isBoss=true;
    const m=MAPS[mapIdx];
    this.name=isSecond?(m.boss2Name||m.bossName):m.bossName;
    this.col=m.bossCol;
    const baseHp=isSecond?3500:1800, scale=1+mapIdx*0.25;
    this.maxHp=Math.ceil(baseHp*scale); this.hp=this.maxHp;
    this.baseDmg=35+mapIdx*5; this.dmg=this.baseDmg;
    this.spd=60+mapIdx*3;
    this.dead=false;this.hitT=0;this.wobble=0;this.contactCd=0;
    this.chargeCD=4;this.chargeTimer=3;this.isCharging=false;
    this.chargeVx=0;this.chargeVy=0;this.chargeDur=0;
    this.xp=30;this.sc=500+mapIdx*100;
  }
  takeDamage(amt){
    if(this.dead)return; amt*=(player?player.dmgMult:1);
    this.hp-=amt;this.hitT=0.1;spawnDmgNum(this.x,this.y,Math.floor(amt));
    if(this.hp<=0){this.dead=true;this.die();}
  }
  die(){
    score+=this.sc;
    for(let i=0;i<this.xp;i++) gems.push(new Gem(this.x+rand(-35,35),this.y+rand(-35,35),1));
    spawnParticles(this.x,this.y,'#ff2244',20);spawnParticles(this.x,this.y,'#ffdd44',20);
    checkBossVictory();
  }
  update(dt){
    this.wobble+=dt*1.8; if(this.hitT>0) this.hitT-=dt;
    if(this.isCharging){
      this.x+=this.chargeVx*dt;this.y+=this.chargeVy*dt;this.chargeDur-=dt;
      if(this.chargeDur<=0){this.isCharging=false;this.chargeTimer=this.chargeCD;this.dmg=this.baseDmg;}
    } else {
      const dx=player.x-this.x,dy=player.y-this.y,d=Math.hypot(dx,dy)||1;
      this.x+=dx/d*this.spd*dt;this.y+=dy/d*this.spd*dt;
      this.chargeTimer-=dt;
      if(this.chargeTimer<=0){
        this.isCharging=true;this.chargeDur=0.55;
        const n=norm(player.x-this.x,player.y-this.y);
        this.chargeVx=n.x*400;this.chargeVy=n.y*400;this.dmg=this.baseDmg*2;
        spawnParticles(this.x,this.y,'#ff4400',8);
      }
    }
    if(this.contactCd>0) this.contactCd-=dt;
    if(dist(this,player)<this.r+player.r&&this.contactCd<=0){
      player.takeDamage(this.dmg*(1-player.defense));this.contactCd=0.5;
    }
  }
  draw(){
    const sx=this.x-camera.x,sy=this.y-camera.y;
    if(sx<-100||sx>W+100||sy<-100||sy>H+100) return;
    const bob=Math.sin(this.wobble)*3;
    ctx.save();
    if(this.hitT>0) ctx.filter='brightness(2.5) saturate(0)';
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.ellipse(sx,sy+this.r-2,this.r*.9,this.r*.35,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=this.isCharging?50:25; ctx.shadowColor=this.isCharging?'#ff4400':this.col;
    ctx.fillStyle=this.isCharging?'#ff3300':this.col;
    ctx.beginPath(); ctx.arc(sx,sy+bob,this.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle=this.isCharging?'#ff6644':'#ff5566';
    ctx.beginPath(); ctx.arc(sx,sy+bob,this.r*.7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffdd44';ctx.shadowBlur=8;ctx.shadowColor='#ffaa00';
    for(let i=0;i<5;i++){const a=-Math.PI/2+(i-2)*0.42;
      ctx.beginPath();ctx.moveTo(sx+Math.cos(a)*this.r,sy+bob+Math.sin(a)*this.r);
      ctx.lineTo(sx+Math.cos(a-0.18)*(this.r+18),sy+bob+Math.sin(a-0.18)*(this.r+18));
      ctx.lineTo(sx+Math.cos(a+0.18)*(this.r+18),sy+bob+Math.sin(a+0.18)*(this.r+18));
      ctx.closePath();ctx.fill();}
    ctx.shadowBlur=0;
    const ed=norm(player.x-this.x,player.y-this.y);
    ctx.fillStyle='#fff';ctx.beginPath();
    ctx.arc(sx+ed.x*16-ed.y*11,sy+bob+ed.y*16+ed.x*11,8,0,Math.PI*2);
    ctx.arc(sx+ed.x*16+ed.y*11,sy+bob+ed.y*16-ed.x*11,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff0000';ctx.beginPath();
    ctx.arc(sx+ed.x*19-ed.y*11,sy+bob+ed.y*19+ed.x*11,4.5,0,Math.PI*2);
    ctx.arc(sx+ed.x*19+ed.y*11,sy+bob+ed.y*19-ed.x*11,4.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff6688';ctx.font=`bold ${fs(12)}px Courier New`;ctx.textAlign='center';
    ctx.shadowBlur=6;ctx.shadowColor='#000';
    ctx.fillText(`★ ${this.name} ★`,sx,sy+bob-this.r-8);ctx.shadowBlur=0;
    ctx.restore();
  }
}
function checkBossVictory(){
  setTimeout(()=>{
    const m=MAPS[selectedMapIdx];
    const alive=enemies.filter(e=>e.isBoss&&!e.dead);
    if(alive.length>0) return;
    if(m.twoBoss){if(bossSpawned&&boss2Spawned) triggerVictory();}
    else triggerVictory();
  },100);
}
function triggerVictory(){
  const m=MAPS[selectedMapIdx];
  sessionCrystals=m.crystals; save.crystals+=sessionCrystals;
  if(!save.clearedMaps.includes(selectedMapIdx)) save.clearedMaps.push(selectedMapIdx);
  for(const [k,c] of Object.entries(CHARACTERS)){
    if(c.unlockMap===selectedMapIdx&&!save.unlockedChars.includes(k)) save.unlockedChars.push(k);
  }
  writeSave(save); state='victory';
}

// ── Projectile class (FIX #4: homing) ───────────────────────────────
class Proj {
  constructor(x,y,vx,vy,r,col,dmg,pierce,type){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.r=r;this.col=col;this.dmg=dmg;this.pierce=pierce;
    this.type=type;this.life=2;this.gravity=0;
    this.rot=0;this.rotSpd=0;this.slow=0;this.stk=0;
    this.hit=new Set();
  }
  update(dt){
    // FIX #4: homing — steer toward nearest enemy
    const spd=Math.hypot(this.vx,this.vy);
    if(spd>50&&this.type!=='meteor'){
      let best=null, bestD=300;
      for(const e of enemies){
        if(e.dead||this.hit.has(e)) continue;
        const d=Math.hypot(e.x-this.x,e.y-this.y);
        if(d<bestD){bestD=d;best=e;}
      }
      if(best){
        const dx=best.x-this.x, dy=best.y-this.y;
        const dn=norm(dx,dy);
        const curN=norm(this.vx,this.vy);
        const turnRate=3.5*dt; // how fast to turn
        const nx=lerp(curN.x,dn.x,turnRate), ny=lerp(curN.y,dn.y,turnRate);
        const nn=norm(nx,ny);
        this.vx=nn.x*spd; this.vy=nn.y*spd;
      }
    }
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    this.vy+=this.gravity*dt; this.life-=dt;
    if(this.rotSpd) this.rot+=this.rotSpd*dt;
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(this.hit.has(e)||e.dead) continue;
      if(dist(this,e)<this.r+e.r){
        this.hit.add(e); e.takeDamage(this.dmg);
        if(this.slow>0) e.slowT=Math.max(e.slowT||0,1.5);
        if(this.type==='heal'&&player) player.hp=Math.min(player.hp+2,player.maxHp);
        if(this.type==='explode'){
          for(const e2 of enemies){if(!e2.dead&&e2!==e&&dist(this,e2)<60+this.stk*15) e2.takeDamage(this.dmg*0.6);}
          spawnParticles(this.x,this.y,'#ff4400',8); this.life=-1; break;
        }
        if(this.type==='poison'){
          for(const e2 of enemies){if(!e2.dead&&dist(this,e2)<50+this.stk*12){e2.takeDamage(this.dmg*0.4);e2.poisonT=2+this.stk;}}
          spawnParticles(this.x,this.y,'#44ff66',6); this.life=-1; break;
        }
        this.pierce--;
        if(this.pierce<0){this.life=-1;break;}
      }
    }
    return this.life>0;
  }
  draw(){
    const sx=this.x-camera.x,sy=this.y-camera.y;
    if(sx<-20||sx>W+20||sy<-20||sy>H+20) return;
    ctx.save(); ctx.translate(sx,sy); ctx.rotate(this.rot);
    ctx.shadowBlur=10; ctx.shadowColor=this.col;
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(-this.r*.25,-this.r*.25,this.r*.35,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Gem / Particle ───────────────────────────────────────────────────
class Gem {
  constructor(x,y,v){this.x=x;this.y=y;this.v=v;this.r=5+v;this.bob=rand(0,Math.PI*2);}
  update(dt){this.bob+=dt*2;}
  draw(){
    const sx=this.x-camera.x,sy=this.y-camera.y;
    if(sx<-20||sx>W+20||sy<-20||sy>H+20) return;
    const b=Math.sin(this.bob)*2;
    ctx.save(); ctx.shadowBlur=8; ctx.shadowColor='#00ff88'; ctx.fillStyle='#00ff88';
    ctx.beginPath(); ctx.moveTo(sx,sy+b-this.r); ctx.lineTo(sx+this.r,sy+b); ctx.lineTo(sx,sy+b+this.r); ctx.lineTo(sx-this.r,sy+b);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
}
class Particle {
  constructor(x,y,col){
    this.x=x;this.y=y;this.col=col;
    const a=rand(0,Math.PI*2),s=rand(40,130);
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.life=rand(0.3,.8);this.maxL=this.life;this.r=rand(2,5);
  }
  update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;this.vx*=0.93;this.vy*=0.93;this.life-=dt;return this.life>0;}
  draw(){
    const sx=this.x-camera.x,sy=this.y-camera.y,a=this.life/this.maxL;
    ctx.globalAlpha=a;ctx.fillStyle=this.col;
    ctx.beginPath();ctx.arc(sx,sy,this.r*a,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }
}

// ── Player class (FIX #7: always show player.png) ────────────────────
class Player {
  constructor(charKey){
    const c=CHARACTERS[charKey]; this.charKey=charKey;
    this.x=0;this.y=0;this.r=16;
    this.hp=c.hp;this.maxHp=c.hp;
    this.speed=c.speed;this.xp=0;this.level=1;this.xpNext=5;
    this.invT=0;this.flickT=0;this.facing=0;this.weapons=[];
    this.pickup=65;this.cdMult=1;this.dmgMult=1;
    this.defense=0;this.poisonDmg=0;this.regenPerSec=0;this.healOnKill=0;
    this.glowCol=c.glowCol;
    this.vx=0;this.vy=0;
    this.addSkill(c.startSkill);
  }
  addSkill(id){
    const def=SKILLS[id]; if(!def)return;
    const existing=this.weapons.find(w=>w.id===id);
    if(existing){if(existing.stack<3){existing.stack++;this._applySkillStack(id);}return;}
    if(def.type==='active') this.weapons.push({id,stack:1,timer:0,cooldown:def.cooldown});
    else {this.weapons.push({id,stack:1,timer:0,cooldown:999});this._applySkillStack(id);}
  }
  _applySkillStack(id){const def=SKILLS[id];if(def.type==='passive'&&def.onApply){const w=this.weapons.find(w=>w.id===id);def.onApply(this,w?w.stack:1);}}
  hasSkill(id){return this.weapons.some(w=>w.id===id);}
  gainXP(v){this.xp+=v;while(this.xp>=this.xpNext){this.xp-=this.xpNext;this.levelUp();}}
  levelUp(){this.level++;this.xpNext=Math.floor(this.xpNext*1.2+2);this.hp=Math.min(this.hp+15,this.maxHp);buildUpgradeChoices();state='levelup';}
  takeDamage(amt){if(this.invT>0)return;this.hp-=amt;this.invT=0.7;this.flickT=0.7;spawnParticles(this.x,this.y,'#ff4444',6);if(this.hp<=0){this.hp=0;state='gameover';}}
  update(dt){
    // keyboard + joystick input
    let dx=0,dy=0;
    if(keys['ArrowLeft']||keys['a']||keys['A']) dx-=1;
    if(keys['ArrowRight']||keys['d']||keys['D']) dx+=1;
    if(keys['ArrowUp']||keys['w']||keys['W']) dy-=1;
    if(keys['ArrowDown']||keys['s']||keys['S']) dy+=1;
    // FIX #2: virtual joystick input
    if(joystick.active){dx+=joystick.dx;dy+=joystick.dy;}
    const m=MAPS[selectedMapIdx];
    if(m.mechanic==='ice'){
      const n=norm(dx||0.001,dy||0.001);
      if(dx||dy){this.vx=lerp(this.vx,n.x*this.speed,dt*2);this.vy=lerp(this.vy,n.y*this.speed,dt*2);}
      else {this.vx*=Math.pow(0.96,dt*60);this.vy*=Math.pow(0.96,dt*60);}
      this.x+=this.vx*dt;this.y+=this.vy*dt;
    } else if(m.mechanic==='current'){
      const n2=norm(dx,dy);
      this.x+=n2.x*this.speed*dt+35*dt;this.y+=n2.y*this.speed*dt+20*Math.sin(gameTime)*dt;
    } else {
      const n=norm(dx,dy);this.x+=n.x*this.speed*dt;this.y+=n.y*this.speed*dt;
    }
    this.x=clamp(this.x,-MAP_HW+this.r,MAP_HW-this.r);
    this.y=clamp(this.y,-MAP_HH+this.r,MAP_HH-this.r);
    if(dx||dy) this.facing=Math.atan2(dy,dx);
    if(this.invT>0) this.invT-=dt;
    if(this.flickT>0) this.flickT-=dt;
    if(this.regenPerSec>0) this.hp=Math.min(this.hp+this.regenPerSec*dt,this.maxHp);
    for(const w of this.weapons){
      const def=SKILLS[w.id]; if(!def||def.type!=='active') continue;
      w.timer-=dt;
      if(w.timer<=0){w.timer=w.cooldown*this.cdMult;def.fire(w,this,w.stack);}
    }
    for(let i=gems.length-1;i>=0;i--){
      const g=gems[i],d=dist(this,g);
      if(d<this.pickup+g.r){this.gainXP(g.v);spawnParticles(g.x,g.y,'#00ff88',4);gems.splice(i,1);}
      else if(d<this.pickup*3){const pn=norm(this.x-g.x,this.y-g.y);g.x+=pn.x*280*dt;g.y+=pn.y*280*dt;}
    }
  }
  draw(){
    if(this.flickT>0&&Math.floor(this.flickT*10)%2===0) return;
    const sx=this.x-camera.x, sy=this.y-camera.y;
    const size=this.r*2.2*1.5;
    ctx.save();
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(sx,sy+this.r-2,this.r*.85,this.r*.3,0,0,Math.PI*2); ctx.fill();
    // glow
    const gc=this.glowCol;
    const grd=ctx.createRadialGradient(sx,sy,0,sx,sy,this.r*1.4);
    grd.addColorStop(0,hexAlpha(gc,0.45)); grd.addColorStop(1,hexAlpha(gc,0));
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.arc(sx,sy,this.r*1.4,0,Math.PI*2); ctx.fill();
    // draw character image (each character uses their own PNG)
    ctx.shadowBlur=0;ctx.shadowColor='transparent';ctx.globalAlpha=1;
    ctx.globalCompositeOperation='source-over';ctx.filter='none';
    const charImg=charImages[this.charKey];
    if(charImg){
      if(Math.cos(this.facing)<0){ctx.translate(sx,sy);ctx.scale(-1,1);ctx.drawImage(charImg,-size/2,-size/2,size,size);}
      else ctx.drawImage(charImg,sx-size/2,sy-size/2,size,size);
    } else {
      // fallback circle while image loads
      ctx.shadowBlur=15;ctx.shadowColor=gc;ctx.fillStyle=gc;
      ctx.beginPath();ctx.arc(sx,sy,this.r,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}

// ── helpers ──────────────────────────────────────────────────────────
function nearestEnemies(x,y,count){
  return [...enemies].filter(e=>!e.dead).sort((a,b)=>Math.hypot(a.x-x,a.y-y)-Math.hypot(b.x-x,b.y-y)).slice(0,count);
}
function spawnParticles(x,y,col,n){if(particles.length>400)return;for(let i=0;i<n;i++) particles.push(new Particle(x,y,col));}
function spawnDmgNum(x,y,v){damageNums.push({x,y,v,life:0.9,maxL:0.9,vy:-55});}

// ── spawning (FIX #6: more types, faster pace) ──────────────────────
function spawnEnemy(){
  if(enemies.length>=300) return; // increased cap
  const side=randInt(0,3);
  let x,y; const M=130;
  if(side===0){x=camera.x-M;y=camera.y+rand(0,H);}
  else if(side===1){x=camera.x+W+M;y=camera.y+rand(0,H);}
  else if(side===2){x=camera.x+rand(0,W);y=camera.y-M;}
  else{x=camera.x+rand(0,W);y=camera.y+H+M;}
  const mins=gameTime/60;
  let pool;
  if(mins<0.5)     pool=[0,0,0,1];
  else if(mins<1)  pool=[0,0,1,1,6,7];
  else if(mins<2)  pool=[0,1,1,2,5,6,7];
  else if(mins<3)  pool=[0,1,2,2,3,5,6,7];
  else if(mins<5)  pool=[1,2,3,3,4,5,6,7];
  else             pool=[2,3,4,4,5,6,7];
  enemies.push(new Enemy(x,y,pool[randInt(0,pool.length-1)],gameTime));
}
function spawnBoss(isSecond){
  const side=randInt(0,3);let x,y;const M=180;
  if(side===0){x=camera.x-M;y=camera.y+H/2;}
  else if(side===1){x=camera.x+W+M;y=camera.y+H/2;}
  else if(side===2){x=camera.x+W/2;y=camera.y-M;}
  else{x=camera.x+W/2;y=camera.y+H+M;}
  const boss=new Boss(x,y,selectedMapIdx,isSecond);
  enemies.push(boss);
  roundBanner={text:`⚠ BOSS ${boss.name} 出现了! ⚠`,timer:3};
}

// ── level up ─────────────────────────────────────────────────────────
function buildUpgradeChoices(){
  const pool=[];
  const skillPool=CHAR_SKILL_POOLS[selectedCharKey]||[];
  for(const sid of skillPool){
    const def=SKILLS[sid]; if(!def)continue;
    const existing=player.weapons.find(w=>w.id===sid);
    if(existing){if(existing.stack<3) pool.push({type:'skill_up',id:sid,name:`强化 ${def.name}`,desc:`叠加到 ${existing.stack+1}/3 层`,icon:def.icon,col:def.color,sid});}
    else pool.push({type:'skill_new',id:sid,name:`获得 ${def.name}`,desc:def.desc,icon:def.icon,col:def.color,sid});
  }
  for(const s of STAT_UPS) pool.push({type:'stat',name:s.name,desc:s.desc,icon:s.icon,col:'#aaaacc',apply:s.f});
  shuffle(pool); upgradeChoices=pool.slice(0,3);
}
function handleLevelUpClick(mx,my){
  const p=portrait();
  if(p){
    const cw=W*0.85,ch=H*0.18,gap=H*0.03;
    const total=ch*3+gap*2;
    const sx=(W-cw)/2,baseY=(H-total)/2;
    for(let i=0;i<upgradeChoices.length;i++){
      const cy=baseY+i*(ch+gap);
      if(mx>=sx&&mx<=sx+cw&&my>=cy&&my<=cy+ch){applyUpgrade(upgradeChoices[i]);state='playing';break;}
    }
  } else {
    const cw=W*0.18,ch=H*0.42,gap=W*0.025,total=cw*3+gap*2;
    const sx=(W-total)/2,sy=(H-ch)/2;
    for(let i=0;i<upgradeChoices.length;i++){
      const cx=sx+i*(cw+gap);
      if(mx>=cx&&mx<=cx+cw&&my>=sy&&my<=sy+ch){applyUpgrade(upgradeChoices[i]);state='playing';break;}
    }
  }
}
function applyUpgrade(c){
  if(c.type==='skill_up'||c.type==='skill_new') player.addSkill(c.sid);
  else c.apply(player);
}

// ── character / map select ───────────────────────────────────────────
function charSelectLayout(){
  const chars=Object.entries(CHARACTERS);
  const cols=1,cw=640,ch=200,gap=12;
  const baseX=(W-cw)/2,baseY=140;
  return {chars,cols,cw,ch,gap,baseX,baseY};
}
function handleCharSelectClick(mx,my){
  const {chars,cols,cw,ch,gap,baseX,baseY}=charSelectLayout();
  for(let i=0;i<chars.length;i++){
    const row=Math.floor(i/cols),col=i%cols;
    const cx=baseX+col*(cw+gap),cy=baseY+row*(ch+gap);
    const [key]=chars[i];
    if(save.unlockedChars.includes(key)&&mx>=cx&&mx<=cx+cw&&my>=cy&&my<=cy+ch){selectedCharKey=key;state='mapselect';return;}
  }
}
function mapSelectLayout(){
  const p=portrait();
  if(p){
    const cols=2,cw=(W-W*0.1-16)/cols,ch=cw*0.6,gap=12;
    const baseX=W*0.05,baseY=H*0.14;
    return {cols,cw,ch,gap,baseX,baseY};
  } else {
    const cols=4,cw=Math.min(180,W*0.18),ch=cw*0.55,gap=Math.min(16,W*0.015);
    const totalW=cw*cols+gap*(cols-1),baseX=(W-totalW)/2,baseY=H*0.18;
    return {cols,cw,ch,gap,baseX,baseY};
  }
}
function handleMapSelectClick(mx,my){
  const {cols,cw,ch,gap,baseX,baseY}=mapSelectLayout();
  for(let i=0;i<MAPS.length;i++){
    const row=Math.floor(i/cols),col=i%cols;
    const cx=baseX+col*(cw+gap),cy=baseY+row*(ch+gap);
    const unlocked=i===0||save.clearedMaps.includes(i-1);
    if(unlocked&&mx>=cx&&mx<=cx+cw&&my>=cy&&my<=cy+ch){selectedMapIdx=i;startGame();return;}
  }
  const bw=W*0.2,bh=H*0.05;
  if(mx>=W*0.02&&mx<=W*0.02+bw&&my>=H-bh-H*0.02&&my<=H-H*0.02) state='charselect';
}

// ── draw helpers ─────────────────────────────────────────────────────
function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── start game ───────────────────────────────────────────────────────
function startGame(){
  player=new Player(selectedCharKey);
  camera={x:-W/2,y:-H/2};
  enemies=[];projectiles=[];gems=[];particles=[];
  damageNums=[];lightningFX=[];
  gameTime=0;score=0;spawnTimer=0;upgradeChoices=[];
  bossSpawned=false;boss2Spawned=false;sessionCrystals=0;roundBanner=null;
  mapHazards={timer:0,frozen:false};
  state='playing';
}

// ── update ───────────────────────────────────────────────────────────
function update(dt){
  if(state!=='playing') return;
  gameTime+=dt;
  const m=MAPS[selectedMapIdx];
  // boss spawn — use map duration
  if(m.twoBoss){
    if(!bossSpawned&&gameTime>=m.boss2Time){bossSpawned=true;spawnBoss(false);}
    if(!boss2Spawned&&gameTime>=m.duration){boss2Spawned=true;spawnBoss(true);}
  } else {
    if(!bossSpawned&&gameTime>=m.duration){bossSpawned=true;spawnBoss(false);}
  }
  if(roundBanner){roundBanner.timer-=dt;if(roundBanner.timer<=0)roundBanner=null;}
  camera.x=player.x-W/2;camera.y=player.y-H/2;
  updateMapHazards(dt);
  const frozen=mapHazards.frozen||false;
  player.update(dt);
  for(let i=projectiles.length-1;i>=0;i--) if(!projectiles[i].update(dt)) projectiles.splice(i,1);
  if(!frozen){for(const e of enemies) if(!e.dead) e.update(dt);}
  for(let i=enemies.length-1;i>=0;i--) if(enemies[i].dead) enemies.splice(i,1);
  for(const g of gems) g.update(dt);
  for(let i=particles.length-1;i>=0;i--) if(!particles[i].update(dt)) particles.splice(i,1);
  for(let i=damageNums.length-1;i>=0;i--){const d=damageNums[i];d.y+=d.vy*dt;d.vy*=0.88;d.life-=dt;if(d.life<=0) damageNums.splice(i,1);}
  for(let i=lightningFX.length-1;i>=0;i--){lightningFX[i].t-=dt;if(lightningFX[i].t<=0) lightningFX.splice(i,1);}
  // FIX #6: faster spawning
  spawnTimer-=dt;
  if(spawnTimer<=0){
    const mins=gameTime/60;
    const interval=Math.max(0.15, 1.8-mins*0.22);
    const cnt=Math.max(2, Math.floor(mins*0.8+2));
    for(let i=0;i<cnt;i++) spawnEnemy();
    spawnTimer=interval;
  }
}

// ── map hazards (FIX #3: removed minecart rectangles) ────────────────
function updateMapHazards(dt){
  const m=MAPS[selectedMapIdx],h=mapHazards;
  h.timer=(h.timer||0)+dt;
  if(m.mechanic==='fire'){
    if(!h.fireZones) h.fireZones=[];
    if(!h.fireSpawn) h.fireSpawn=0;
    h.fireSpawn-=dt;
    if(h.fireSpawn<=0){h.fireSpawn=5;
      for(let i=0;i<3;i++) h.fireZones.push({x:player.x+rand(-250,250),y:player.y+rand(-250,250),r:50,life:3,warn:1.5});}
    for(let i=h.fireZones.length-1;i>=0;i--){const z=h.fireZones[i];z.life-=dt;z.warn-=dt;
      if(z.life<=0){h.fireZones.splice(i,1);continue;}
      if(z.warn<=0&&dist(player,z)<z.r+player.r) player.takeDamage(8*dt*(1-player.defense));}
  }
  if(m.mechanic==='holylight'){
    if(!h.holyZones) h.holyZones=[];
    if(!h.holySpawn) h.holySpawn=0;
    h.holySpawn-=dt;
    if(h.holySpawn<=0){h.holySpawn=6;
      for(let i=0;i<2;i++) h.holyZones.push({x:player.x+rand(-200,200),y:player.y+rand(-200,200),r:60,life:4,warn:2});}
    for(let i=h.holyZones.length-1;i>=0;i--){const z=h.holyZones[i];z.life-=dt;z.warn-=dt;
      if(z.life<=0){h.holyZones.splice(i,1);continue;}
      if(z.warn<=0&&dist(player,z)<z.r+player.r) player.takeDamage(10*dt*(1-player.defense));}
  }
  if(m.mechanic==='timestop'){
    if(!h.freezeCD) h.freezeCD=12; h.freezeCD-=dt;
    if(h.freezeCD<=0&&!h.frozen){h.frozen=true;h.freezeDur=2.5;roundBanner={text:'⏸ 时间冻结! ⏸',timer:2};}
    if(h.frozen){h.freezeDur-=dt;if(h.freezeDur<=0){h.frozen=false;h.freezeCD=12;}}
  }
  if(m.mechanic==='mirror'){
    if(!h.mirrorCD) h.mirrorCD=15; h.mirrorCD-=dt;
    if(h.mirrorCD<=0){h.mirrorCD=15;
      const clone=new Enemy(player.x+rand(-100,100),player.y+rand(-100,100),3,gameTime);
      clone.hp=player.maxHp*0.6;clone.maxHp=clone.hp;clone.spd=player.speed*0.8;clone.col='#aa00aa';clone.name='镜像分身';
      enemies.push(clone);roundBanner={text:'⚠ 镜像分身出现! ⚠',timer:2};}
  }
}

// ── draw functions ───────────────────────────────────────────────────
// FIX #5: rich background with floor tiles, textures, movement feel
function drawBg(){
  const m=MAPS[selectedMapIdx];
  ctx.fillStyle=m.bgCol; ctx.fillRect(0,0,W,H);
  const leftX=-MAP_HW-camera.x,rightX=MAP_HW-camera.x;
  const topY=-MAP_HH-camera.y,botY=MAP_HH-camera.y;
  // floor tile pattern (makes movement visible)
  ctx.save();
  ctx.beginPath();
  ctx.rect(Math.max(0,leftX),Math.max(0,topY),Math.min(W,rightX)-Math.max(0,leftX),Math.min(H,botY)-Math.max(0,topY));
  ctx.clip();
  const TILE=64;
  const ox=(-camera.x)%TILE, oy=(-camera.y)%TILE;
  const fc=m.floorCol||m.bgCol;
  for(let x=ox-TILE;x<W+TILE;x+=TILE){
    for(let y=oy-TILE;y<H+TILE;y+=TILE){
      const tx=Math.floor((x-ox)/TILE+camera.x/TILE);
      const ty=Math.floor((y-oy)/TILE+camera.y/TILE);
      const alt=(tx+ty)%2===0;
      ctx.fillStyle=alt?fc:m.bgCol;
      ctx.fillRect(x,y,TILE,TILE);
    }
  }
  // grid lines
  ctx.strokeStyle=m.gridCol; ctx.lineWidth=1;
  for(let x=ox;x<W;x+=TILE){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=oy;y<H;y+=TILE){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // scatter dots for texture
  ctx.fillStyle=m.gridCol;
  for(let i=0;i<40;i++){
    const dx2=((i*173+29)%800)+ox*0.5, dy2=((i*131+47)%640)+oy*0.5;
    ctx.beginPath(); ctx.arc(dx2%W,dy2%H,1.2,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // outside map overlay
  ctx.fillStyle='rgba(0,0,0,0.6)';
  if(leftX>0) ctx.fillRect(0,0,leftX,H);
  if(rightX<W) ctx.fillRect(rightX,0,W-rightX,H);
  if(topY>0) ctx.fillRect(Math.max(0,leftX),0,Math.min(W,rightX)-Math.max(0,leftX),topY);
  if(botY<H) ctx.fillRect(Math.max(0,leftX),botY,Math.min(W,rightX)-Math.max(0,leftX),H-botY);
  // walls
  const t=Date.now()/1000, pulse=0.6+0.4*Math.sin(t*2);
  ctx.save();
  ctx.shadowBlur=24*pulse; ctx.shadowColor=m.wallCol;
  ctx.strokeStyle=m.wallCol; ctx.globalAlpha=0.7*pulse; ctx.lineWidth=6;
  const L=leftX,R=rightX,T=topY,B=botY;
  if(L>-6&&L<W){ctx.beginPath();ctx.moveTo(L,Math.max(0,T));ctx.lineTo(L,Math.min(H,B));ctx.stroke();}
  if(R>0&&R<W+6){ctx.beginPath();ctx.moveTo(R,Math.max(0,T));ctx.lineTo(R,Math.min(H,B));ctx.stroke();}
  if(T>-6&&T<H){ctx.beginPath();ctx.moveTo(Math.max(0,L),T);ctx.lineTo(Math.min(W,R),T);ctx.stroke();}
  if(B>0&&B<H+6){ctx.beginPath();ctx.moveTo(Math.max(0,L),B);ctx.lineTo(Math.min(W,R),B);ctx.stroke();}
  ctx.restore();
  drawMapHazards();
}

  ctx.fillText(`最终分数: ${score}`,W/2,H*0.38+lh*2);
  ctx.fillText(`达到等级: ${player.level}`,W/2,H*0.38+lh*3);
  if(Math.floor(Date.now()/550)%2===0){ctx.fillStyle='#aaaacc';ctx.font=`bold ${fs(16)}px Courier New`;ctx.fillText('点击返回角色选择',W/2,H*0.75);}
}
function drawVictory(){
  ctx.fillStyle='rgba(0,0,20,0.92)';ctx.fillRect(0,0,W,H);const t=Date.now()/1000;
  const rad=Math.min(W,H)*0.18;
  ctx.save();for(let i=0;i<12;i++){const a=i/12*Math.PI*2+t*0.3,len=rad+Math.sin(t*2+i)*rad*0.25;
    ctx.strokeStyle=`rgba(255,220,50,${0.2+Math.sin(t+i)*0.15})`;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W/2,H*0.22);ctx.lineTo(W/2+Math.cos(a)*len,H*0.22+Math.sin(a)*len);ctx.stroke();}ctx.restore();
  ctx.textAlign='center';ctx.font=`bold ${fs(40)}px Courier New`;ctx.fillStyle='#ffdd44';ctx.shadowBlur=40;ctx.shadowColor='#ffaa00';ctx.fillText('任务完成!',W/2,H*0.25);ctx.shadowBlur=0;
  const lh=fs(26);
  ctx.font=`${fs(16)}px Courier New`;ctx.fillStyle='#aaddff';ctx.fillText(`${MAPS[selectedMapIdx].name} 通关!`,W/2,H*0.35);
  ctx.fillStyle='#fff';ctx.font=`${fs(14)}px Courier New`;ctx.fillText(`最终分数: ${score}`,W/2,H*0.35+lh);ctx.fillText(`最终等级: ${player.level}`,W/2,H*0.35+lh*2);
  ctx.fillStyle='#88ddff';ctx.font=`bold ${fs(16)}px Courier New`;ctx.fillText(`获得晶石: +${sessionCrystals}`,W/2,H*0.35+lh*3);
  const newChar=Object.entries(CHARACTERS).find(([k,c2])=>c2.unlockMap===selectedMapIdx&&save.unlockedChars.includes(k));
  if(newChar){ctx.fillStyle='#ffaa44';ctx.font=`bold ${fs(14)}px Courier New`;ctx.fillText(`解锁新角色: ${newChar[1].name}!`,W/2,H*0.35+lh*4.5);}
  if(Math.floor(Date.now()/550)%2===0){ctx.fillStyle='#aaaacc';ctx.font=`bold ${fs(14)}px Courier New`;ctx.fillText('点击返回角色选择',W/2,H*0.78);}
}

// ── main loop ────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  if(state==='title'){drawTitle();return;}
  if(state==='charselect'){drawCharSelect();return;}
  if(state==='mapselect'){drawMapSelect();return;}
  drawBg();
  for(const g of gems) g.draw();
  for(const p of projectiles) p.draw();
  for(const e of enemies) e.draw();
  if(state==='playing'||state==='levelup') player.draw();
  for(const p of particles) p.draw();
  drawLightning();
  for(const d of damageNums){const sx=d.x-camera.x,sy=d.y-camera.y;ctx.save();ctx.globalAlpha=clamp(d.life/d.maxL,0,1);ctx.fillStyle='#ffee22';ctx.font=`bold ${fs(12)}px Courier New`;ctx.textAlign='center';ctx.fillText(d.v,sx,sy);ctx.restore();}
  drawHUD(); drawBossBar(); drawRoundBanner(); drawJoystick();
  if(state==='levelup') drawLevelUpScreen();
  if(state==='gameover') drawGameOver();
  if(state==='victory') drawVictory();
}
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,.05); lastTime=ts;
  update(dt); draw(); requestAnimationFrame(loop);
}
state='title'; lastTime=performance.now(); requestAnimationFrame(loop);
</script>
